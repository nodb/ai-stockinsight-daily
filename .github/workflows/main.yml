name: 증권 리포트 Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          ALLOW_AI_FALLBACK: ${{ vars.ALLOW_AI_FALLBACK }}
          NEWS_LIMIT: ${{ vars.NEWS_LIMIT }}
          MAX_PAGES: ${{ vars.MAX_PAGES }}
          DEEP_DIVE_COUNT: ${{ vars.DEEP_DIVE_COUNT }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PWD: ${{ secrets.MAIL_PWD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python main.py
